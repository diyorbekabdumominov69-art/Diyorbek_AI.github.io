<!DOCTYPE html>
<html lang="uz">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Diyorbek AI</title>

    <link rel="stylesheet" href="style.css">

    <script defer src="script.js"></script>

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>📝 Register</h1>

        <p>Diyorbek AI hisobini yarating</p>

        <input
            type="text"
            id="username"
            placeholder="Foydalanuvchi nomi">

        <input
            type="email"
            id="regemail"
            placeholder="Email">

        <input
            type="password"
            id="regpassword"
            placeholder="Parol">

        <button onclick="register()">
            Register
        </button>

        <a href="login.html">
            Login sahifasiga qaytish
        </a>

    </div>

</div>

</body>

</html>
