<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | Diyorbek AI</title>

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>

</head>

<body onload="checkAdmin()">

<div class="chat">

    <div class="sidebar">

        <h2>🛡️ Admin</h2>

        <button onclick="location.href='chat.html'">
            💬 AI Chat

        </div>

        <div class="dashboard">

            <div class="dash-card">

            <div class="dash-card">
                <h3>💬 Chats</h3>

            </div>

            <div class="dash-card">

            </div>

            <div class="dash-card">
                <h3>🟢 Online</h3>

            </div>

        </div>

        <div class="panel">

            <h2>Admin Tools</h2>

            <button onclick="alert('Keyinchalik qo'shiladi')">

            <button onclick="alert('Keyinchalik qo'shiladi')">
                🚫 User bloklash

            <button onclick="alert('Keyinchalik qo'shiladi')">

            </button>

            <button onclick="alert('Keyinchalik qo'shiladi')">

        </div>

</div>

</html>
