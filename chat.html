<!DOCTYPE html>
<html lang="uz">

<head>

<title>Diyorbek AI Chat</title>

<link rel="stylesheet" href="style.css">

<body onload="checkLogin()">


<div class="chat-app">


<!-- SIDEBAR -->

<aside class="sidebar">


<div class="brand">

🤖 Diyorbek AI

</div>

</button>


<button onclick="location.href='history.html'">

</button>


<button onclick="location.href='profile.html'">

👤 Profil

</button>


<button onclick="location.href='premium.html'">

👑 Premium

</button>


<button onclick="location.href='image.html'">

🖼 AI Rasm

</button>


<button onclick="location.href='settings.html'">

</button>


<div class="sidebar-bottom">

</button>


</div>


</aside>



<!-- CHAT AREA -->


<main class="chat-area">



<header class="chat-top">


<div>

<h2>
🤖 Diyorbek AI
</h2>


<p>
Online AI Assistant
</p>


</div>



<div class="status">

</div>


</header>




<section class="messages" id="messages">



<div class="message ai">


<div class="icon">

🤖

</div>


<div class="message-box">


<h4>Diyorbek AI</h4>


<p>

Assalomu alaykum 👋

Men Diyorbek AI.

Sizga qanday yordam bera olaman?

</p>


</div>


</div>




</section>





<footer class="input-area">


<input

id="message"

placeholder="Xabar yozing..."

autocomplete="off"

>


<button onclick="sendMessage()">

➤

</button>


</footer>



</main>



</div>


</body>

</html>
